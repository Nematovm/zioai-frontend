      window.handlePasswordReset = async function() {
  const email = document.getElementById('resetEmail').value.trim();
  const resetBtn = document.getElementById('resetBtn');

  document.getElementById('errorAlert').style.display = 'none';
  document.getElementById('successAlert').style.display = 'none';

  if (!email) { showError('Email kiriting!'); return; }

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) { showError("Email noto'g'ri!"); return; }

  resetBtn.disabled = true;
  resetBtn.textContent = '⏳ Yuborilmoqda...';

  try {
    const API_URL = window.location.hostname.includes("ziyo-ai.uz")
      ? "https://zioai-backend.onrender.com/api"
      : "http://localhost:3000/api";

    const response = await fetch(`${API_URL}/send-reset-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await response.json();

    if (!data.success) throw new Error(data.error);

    // Email saqlash va OTP formani ko'rsatish
    localStorage.setItem('resetEmail', email);
    showResetOTPForm(email);

  } catch (error) {
    showError(error.message || 'Xatolik yuz berdi!');
    resetBtn.disabled = false;
    resetBtn.textContent = 'Tiklash havolasini yuborish';
  }
};

window.rotpMove = function(input, index) {
  input.value = input.value.replace(/[^0-9]/g, '');
  if (input.value && index < 6) document.getElementById(`rotp${index+1}`)?.focus();
  const allFilled = [1,2,3,4,5,6].every(i => document.getElementById(`rotp${i}`)?.value);
  if (allFilled) verifyResetOTP();
};

window.rotpBack = function(e, index) {
  if (e.key === 'Backspace' && !e.target.value && index > 1) {
    document.getElementById(`rotp${index-1}`)?.focus();
  }
};

window.verifyResetOTP = async function() {
  const otp = [1,2,3,4,5,6].map(i => document.getElementById(`rotp${i}`)?.value || '').join('');
  const email = localStorage.getItem('resetEmail');
  const verifyBtn = document.getElementById('verifyResetBtn');
  const errorEl = document.getElementById('resetOtpError');

  if (otp.length !== 6) { errorEl.style.display='block'; errorEl.textContent='6 ta raqam kiriting!'; return; }

  verifyBtn.disabled = true;
  verifyBtn.textContent = '⏳ Tekshirilmoqda...';
  errorEl.style.display = 'none';

  try {
    const API_URL = window.location.hostname.includes("ziyo-ai.uz")
      ? "https://zioai-backend.onrender.com/api"
      : "http://localhost:3000/api";

    const response = await fetch(`${API_URL}/verify-reset-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, otp })
    });

    const data = await response.json();
    if (!data.success) throw new Error(data.error);

    // OTP to'g'ri - yangi parol kiritish formani ko'rsat
    showNewPasswordForm(email);

  } catch (error) {
    errorEl.style.display = 'block';
    errorEl.textContent = error.message;
    verifyBtn.disabled = false;
    verifyBtn.textContent = '✅ Tasdiqlash';
  }
};

function startResetTimer() {
  const btn = document.getElementById('resendResetBtn');
  const timerEl = document.getElementById('resetTimer');
  if (!btn || !timerEl) return;
  btn.disabled = true;
  let seconds = 60;
  const interval = setInterval(() => {
    seconds--;
    timerEl.textContent = `(${seconds}s)`;
    if (seconds <= 0) {
      clearInterval(interval);
      btn.disabled = false;
      timerEl.textContent = '';
    }
  }, 1000);
}

      // Email/Password Login
      window.handleLogin = async function () {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const loginBtn = document.getElementById("loginBtn");
        const errorAlert = document.getElementById("errorAlert");
        const successAlert = document.getElementById("successAlert");
        const resendBtn = document.getElementById("resendVerificationBtn");

        errorAlert.style.display = "none";
        successAlert.style.display = "none";
        resendBtn.style.display = "none";

        if (!email || !password) {
          showError("Please fill in all fields!");
          return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          showError("Please enter a valid email address!");
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        try {
          const userCredential = await signInWithEmailAndPassword(auth, email, password);
          
          // TEMPORARY: Skip email verification check for testing
          // TODO: Remove this after email verification is working
          
          // UNCOMMENT THIS to require email verification:
          /*
          if (!userCredential.user.emailVerified) {
            tempLoginData = { email, password };
            resendBtn.style.display = "block";
            
            showError(`⚠️ Email not verified!

Please check your email inbox (and spam folder) for the verification link.

If you didn't receive it, click "Resend Verification Email" button below.`);
            
            await auth.signOut();
            loginBtn.disabled = false;
            loginBtn.textContent = "Log In";
            return;
          }
          */
          
          // Success
          showSuccess("✅ Login successful! Redirecting...");
          isRedirecting = true;
          
          setTimeout(() => {
            window.location.href = "./dashboard.html";
          }, 1000);
        } catch (error) {
          console.error("Login error:", error);

          let errorMessage = "An error occurred!";

          if (error.code === "auth/user-not-found") {
            errorMessage = "No account found with this email. Please sign up first!";
          } else if (error.code === "auth/wrong-password") {
            errorMessage = "Incorrect password!";
          } else if (error.code === "auth/invalid-email") {
            errorMessage = "Invalid email format!";
          } else if (error.code === "auth/invalid-credential") {
            errorMessage = "Invalid email or password!";
          } else if (error.code === "auth/too-many-requests") {
            errorMessage = "Too many failed attempts. Please try again later.";
          } else if (error.code === "auth/network-request-failed") {
            errorMessage = "Network error. Please check your internet connection!";
          }

          showError(errorMessage);
          loginBtn.disabled = false;
          loginBtn.textContent = "Log In";
        }
      };

          showError("Please log in again to resend verification email.");
          return;
        }
        
        resendBtn.disabled = true;
        resendBtn.textContent = "Sending...";
        
        try {
          // Sign in temporarily to send verification
          const userCredential = await signInWithEmailAndPassword(
            auth, 
            tempLoginData.email, 
            tempLoginData.password
          );
          
          await sendEmailVerification(userCredential.user);
          await auth.signOut();
          
          showSuccess("✅ Verification email sent! Please check your inbox (and spam folder).");
          
          // Reset button after 3 seconds
          setTimeout(() => {
            resendBtn.disabled = false;
            resendBtn.textContent = "📧 Resend Verification Email";
          }, 3000);
        } catch (error) {
          console.error("Resend verification error:", error);
          showError("Failed to resend verification email. Please try again.");
          resendBtn.disabled = false;
          resendBtn.textContent = "📧 Resend Verification Email";
        }
      };

      // FIXED: Google Sign-in - only existing users
      window.handleGoogleSignIn = async function () {
        const errorAlert = document.getElementById("errorAlert");
        const successAlert = document.getElementById("successAlert");
        
        errorAlert.style.display = "none";
        successAlert.style.display = "none";

        try {
          const provider = new GoogleAuthProvider();
          provider.setCustomParameters({
            prompt: 'select_account'
          });
          
          const result = await signInWithPopup(auth, provider);
          
          if (result && result.user) {
            // Check if this is a NEW user
            const isNewUser = result.user.metadata.creationTime === result.user.metadata.lastSignInTime;
            
            if (isNewUser) {
              // Delete new user
              await result.user.delete();
              showError("No account found with this Google account. Please sign up first!");
              return;
            }
            
            // Existing user - allow login
            showSuccess("✅ Successfully signed in! Redirecting...");
            isRedirecting = true;
            
            setTimeout(() => {
              window.location.href = "./dashboard.html";
            }, 1000);
          }
        } catch (error) {
          console.error("Google sign-in error:", error);
          
          if (error.code === "auth/popup-closed-by-user" || 
              error.code === "auth/cancelled-popup-request") {
            return;
          }
          
          let errorMessage = "Failed to sign in with Google!";
          
          if (error.code === "auth/popup-blocked") {
            errorMessage = "Popup blocked. Please allow popups for this site.";
          } else if (error.code === "auth/account-exists-with-different-credential") {
            errorMessage = "An account already exists with this email. Please use email/password login.";
          } else if (error.code === "auth/network-request-failed") {
            errorMessage = "Network error. Please check your internet connection!";
          }
          
          showError(errorMessage);
        }
      };

      // Helper functions
      function showError(message) {
        const errorAlert = document.getElementById("errorAlert");
        errorAlert.innerHTML = message.replace(/\n/g, '<br>');
        errorAlert.style.display = "block";
        errorAlert.style.whiteSpace = "pre-line";
      }

      function showSuccess(message) {
        const successAlert = document.getElementById("successAlert");
        successAlert.textContent = message;
        successAlert.style.display = "block";
      }

      // Enter key support
      document.getElementById("password").addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          handleLogin();
        }
      });

      // Enter key support for reset email
      document.addEventListener('DOMContentLoaded', () => {
        const resetEmailInput = document.getElementById('resetEmail');
        if (resetEmailInput) {
          resetEmailInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
              handlePasswordReset();
            }
          });
        }
      });
    </script>

    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="../JS/app.js"></script>
  </body>
