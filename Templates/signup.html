<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZiyoAI — Sign Up</title>
    <link rel="website icon" type="png" href="../IMG/Logo/ZiyoAILogo.png" />
    <!-- Main CSS -->
    <link rel="stylesheet" href="../Static/auth.css" />
    <link rel="stylesheet" href="../CSS/main.css" />
    <!-- Font-Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <!-- Spinner -->
    <div class="spinner-wrapper">
      <div class="spinner-grow" role="status">
          <span class="visually-hidden">Loading...</span>
      </div>
    </div>
    <!-- Back to home -->
    <a class="back-home" href="../index.html"><i class="bi bi-chevron-left"></i></a>

    <div class="auth-container">
        <div class="main-section">
        <div class="nav-left login-logo">
          <img src="../IMG/Logo/ZiyoAILogo.png" alt="">
          <a class="navbar-brand"><h3 class="nav-title">iyoAI</h3></a>
        </div>
        <h4>Sayohatingizni boshlang</h4>
        <p>Boshlash uchun hisob yarating</p>
      </div>
      <div class="auth-card" id="login-form">

        <!-- Error Alert -->
        <div
          id="errorAlert"
          style="
            display: none;
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
          "
        ></div>

        <!-- Success Alert -->
        <div
          id="successAlert"
          style="
            display: none;
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
          "
        ></div>

        <!-- Warning Alert -->
        <div
          id="warningAlert"
          style="
            display: none;
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
          "
        ></div>

        <div>
          <!-- Signup.html -->
          <div class="input-box">
            <input
              type="text"
              id="username"
              name="username"
              placeholder=" "
              required
            />
            <label>Username</label>
          </div>

          <div class="input-box">
            <input
              type="email"
              id="email"
              name="email"
              placeholder=" "
              required
            />
            <label>Email</label>
          </div>

          <div class="input-box">
            <input
              type="password"
              id="password"
              name="password"
              placeholder=" "
              required
            />
            <label>Parol</label>
          </div>

          <button
            class="btn-primary"
            type="button"
            id="signupBtn"
            onclick="handleSignup()"
          >
            Ro'yxatdan o'tish
          </button>

          <!-- Google Sign-in -->
          <div style="margin: 20px 0; text-align: center; color: #6b7280; font-size: 14px;">
            <span style="display: inline-block; width: 100%; position: relative;">
              <span style="background: white; padding: 0 10px; position: relative; z-index: 1;">or</span>
              <span style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e5e7eb; z-index: 0;"></span>
            </span>
          </div>

          <button
            type="button"
            onclick="handleGoogleSignUp()"
            style="
              width: 100%;
              padding: 12px;
              background: white;
              border: 2px solid #e5e7eb;
              border-radius: 10px;
              cursor: pointer;
              font-size: 15px;
              font-weight: 600;
              color: #374151;
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 10px;
              transition: all 0.3s ease;
            "
            onmouseover="this.style.background='#f9fafb'; this.style.borderColor='#d1d5db'"
            onmouseout="this.style.background='white'; this.style.borderColor='#e5e7eb'"
          >
            <svg width="20" height="20" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
              <path fill="none" d="M0 0h48v48H0z"></path>
            </svg>
            Google orqali davom etish
          </button>
        </div>

        <p class="switch-link">
          Allaqachon hisobingiz bormi? <a href="./login.html">Kirish</a>
        </p>
      </div>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    updateProfile,
    signInWithPopup,
    GoogleAuthProvider,
    onAuthStateChanged,
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA_w0n84YFtUYZgZodCn52lfYiqkL6v1HM",
    authDomain: "zioai-96e9f.firebaseapp.com",
    projectId: "zioai-96e9f",
    storageBucket: "zioai-96e9f.firebasestorage.app",
    messagingSenderId: "766076125152",
    appId: "1:766076125152:web:9cd609efb7895386547585",
    measurementId: "G-2EDVXFZFHQ",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const API_URL = window.location.hostname.includes("ziyo-ai.uz")
    ? "https://zioai-backend.onrender.com/api"
    : "http://localhost:3000/api";

  // Agar user allaqachon kirgan bo'lsa
  onAuthStateChanged(auth, (user) => {
    if (user && user.emailVerified) {
      window.location.href = "./dashboard.html";
    }
  });

  // ============================================
  // STEP 1: SIGNUP - Firebase user yaratish + OTP yuborish
  // ============================================
  window.handleSignup = async function () {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const signupBtn = document.getElementById("signupBtn");

    hideAlerts();

    if (!username || !email || !password) {
      showError("Barcha maydonlarni to'ldiring!");
      return;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      showError("Email manzil noto'g'ri!");
      return;
    }

    if (password.length < 6) {
      showError("Parol kamida 6 ta belgidan iborat bo'lishi kerak!");
      return;
    }

    signupBtn.disabled = true;
    signupBtn.textContent = "⏳ Yuklanmoqda...";

    try {
      // Firebase da user yaratish
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);

      await updateProfile(userCredential.user, { displayName: username });

      // User ni sign out qilish (verify bo'lgunicha kirmasin)
      await auth.signOut();

      // Backend ga OTP yuborish so'rovi
      const response = await fetch(`${API_URL}/send-otp`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, username }),
      });

      const data = await response.json();

      if (!data.success) {
        throw new Error(data.error || "OTP yuborishda xatolik");
      }

      // Email va parolni localStorage da saqlash (OTP verify uchun)
      localStorage.setItem("pendingEmail", email);
      localStorage.setItem("pendingPassword", password);
      localStorage.setItem("pendingUsername", username);

      // OTP kiritish formani ko'rsatish
      showOTPForm(email);

    } catch (error) {
      console.error("Signup error:", error);

      if (error.code === "auth/email-already-in-use") {
        showError("Bu email allaqachon ro'yxatdan o'tgan!");
        setTimeout(() => { window.location.href = "./login.html"; }, 2000);
      } else if (error.code === "auth/invalid-email") {
        showError("Email manzil noto'g'ri formatda!");
      } else if (error.code === "auth/weak-password") {
        showError("Parol juda zaif!");
      } else {
        showError(error.message || "Xatolik yuz berdi!");
      }

      signupBtn.disabled = false;
      signupBtn.textContent = "Ro'yxatdan o'tish";
    }
  };

  // ============================================
  // STEP 2: OTP FORMANI KO'RSATISH
  // ============================================
  function showOTPForm(email) {
    const loginForm = document.getElementById("login-form");

    loginForm.innerHTML = `
      <div style="text-align:center; margin-bottom:24px;">
        <div style="font-size:56px; margin-bottom:12px;">📧</div>
        <h3 style="margin:0 0 8px; color:#1f2937; font-size:20px; font-weight:700;">
          Emailni tasdiqlang
        </h3>
        <p style="margin:0; color:#6b7280; font-size:14px; line-height:1.6;">
          <strong style="color:#667eea;">${email}</strong> manziliga<br>
          6 raqamli kod yuborildi
        </p>
      </div>

      <div id="otpError" style="display:none; background:#fee; color:#c33; padding:12px; border-radius:8px; margin-bottom:16px; font-size:14px; text-align:center;"></div>
      <div id="otpSuccess" style="display:none; background:#efe; color:#3c3; padding:12px; border-radius:8px; margin-bottom:16px; font-size:14px; text-align:center;"></div>

      <div style="display:flex; gap:10px; justify-content:center; margin-bottom:24px;">
        ${[1,2,3,4,5,6].map(i => `
          <input
            type="text"
            id="otp${i}"
            maxlength="1"
            style="
              width:48px; height:56px; text-align:center;
              font-size:24px; font-weight:700; color:#1f2937;
              border:2px solid #e5e7eb; border-radius:12px;
              outline:none; transition:all 0.2s;
            "
            oninput="moveToNext(this, ${i})"
            onkeydown="handleOtpKeydown(event, ${i})"
            onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102,126,234,0.15)'"
            onblur="this.style.borderColor='#e5e7eb'; this.style.boxShadow='none'"
          />
        `).join('')}
      </div>

      <button
        onclick="verifyOTP()"
        id="verifyBtn"
        style="
          width:100%; padding:14px; border:none; border-radius:12px;
          background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color:white; font-size:16px; font-weight:600; cursor:pointer;
          transition:all 0.3s; margin-bottom:16px;
        "
      >
        ✅ Tasdiqlash
      </button>

      <div style="text-align:center;">
        <span style="font-size:14px; color:#6b7280;">Kod kelmadimi? </span>
        <button
          onclick="resendOTP('${email}')"
          id="resendBtn"
          style="background:none; border:none; color:#667eea; font-size:14px; font-weight:600; cursor:pointer;"
        >
          Qayta yuborish
        </button>
        <span id="resendTimer" style="font-size:13px; color:#9ca3af; margin-left:6px;"></span>
      </div>

      <div style="margin-top:16px; text-align:center;">
        <a href="./signup.html" style="font-size:13px; color:#9ca3af;">← Orqaga</a>
      </div>
    `;

    // Birinchi inputga focus
    setTimeout(() => { document.getElementById("otp1")?.focus(); }, 100);

    // Resend timer (60 soniya)
    startResendTimer();
  }

  // ============================================
  // OTP INPUT - AVTOMATIK O'TISH
  // ============================================
  window.moveToNext = function(input, index) {
    input.value = input.value.replace(/[^0-9]/g, '');
    if (input.value && index < 6) {
      document.getElementById(`otp${index + 1}`)?.focus();
    }
    // 6 ta to'ldi - avtomatik verify
    const allFilled = [1,2,3,4,5,6].every(i => document.getElementById(`otp${i}`)?.value);
    if (allFilled) verifyOTP();
  };

  window.handleOtpKeydown = function(e, index) {
    if (e.key === "Backspace" && !e.target.value && index > 1) {
      document.getElementById(`otp${index - 1}`)?.focus();
    }
  };

  // ============================================
  // STEP 3: OTP TEKSHIRISH
  // ============================================
  window.verifyOTP = async function() {
    const otp = [1,2,3,4,5,6].map(i => document.getElementById(`otp${i}`)?.value || '').join('');

    if (otp.length !== 6) {
      document.getElementById("otpError").style.display = "block";
      document.getElementById("otpError").textContent = "6 ta raqamni kiriting!";
      return;
    }

    const email = localStorage.getItem("pendingEmail");
    const verifyBtn = document.getElementById("verifyBtn");

    verifyBtn.disabled = true;
    verifyBtn.textContent = "⏳ Tekshirilmoqda...";
    document.getElementById("otpError").style.display = "none";

    try {
      const response = await fetch(`${API_URL}/verify-otp`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, otp }),
      });

      const data = await response.json();

      if (!data.success) {
        throw new Error(data.error);
      }

      // ✅ OTP to'g'ri - Firebase da login qilish
      const password = localStorage.getItem("pendingPassword");

      const { signInWithEmailAndPassword, updateProfile } = await import(
        "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
      );

      const userCredential = await signInWithEmailAndPassword(auth, email, password);

      // emailVerified ni true qilish uchun Firebase emailVerification yuborish
      const { sendEmailVerification } = await import(
        "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
      );
      
      // LocalStorage tozalash
      localStorage.removeItem("pendingEmail");
      localStorage.removeItem("pendingPassword");
      localStorage.removeItem("pendingUsername");

      document.getElementById("otpSuccess").style.display = "block";
      document.getElementById("otpSuccess").textContent = "✅ Email tasdiqlandi! Dashboard ga o'tilmoqda...";

      setTimeout(() => {
        window.location.href = "./dashboard.html";
      }, 1500);

    } catch (error) {
      console.error("OTP verify error:", error);
      document.getElementById("otpError").style.display = "block";
      document.getElementById("otpError").textContent = error.message || "Noto'g'ri kod!";
      verifyBtn.disabled = false;
      verifyBtn.textContent = "✅ Tasdiqlash";
    }
  };

  // ============================================
  // RESEND OTP
  // ============================================
  window.resendOTP = async function(email) {
    const resendBtn = document.getElementById("resendBtn");
    resendBtn.disabled = true;

    try {
      const username = localStorage.getItem("pendingUsername");
      const response = await fetch(`${API_URL}/send-otp`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, username }),
      });

      const data = await response.json();

      if (data.success) {
        document.getElementById("otpSuccess").style.display = "block";
        document.getElementById("otpSuccess").textContent = "✅ Yangi kod yuborildi!";
        setTimeout(() => {
          document.getElementById("otpSuccess").style.display = "none";
        }, 3000);
        startResendTimer();
      }
    } catch (error) {
      resendBtn.disabled = false;
    }
  };

  // Resend timer
  function startResendTimer() {
    const resendBtn = document.getElementById("resendBtn");
    const timerEl = document.getElementById("resendTimer");
    if (!resendBtn || !timerEl) return;

    resendBtn.disabled = true;
    let seconds = 60;

    const interval = setInterval(() => {
      seconds--;
      timerEl.textContent = `(${seconds}s)`;
      if (seconds <= 0) {
        clearInterval(interval);
        resendBtn.disabled = false;
        timerEl.textContent = "";
      }
    }, 1000);
  }

  // ============================================
  // GOOGLE SIGN-UP
  // ============================================
  window.handleGoogleSignUp = async function () {
    hideAlerts();
    try {
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      const result = await signInWithPopup(auth, provider);
      if (result && result.user) {
        showSuccess("Google orqali muvaffaqiyatli kirdingiz!");
        setTimeout(() => { window.location.href = "./dashboard.html"; }, 1000);
      }
    } catch (error) {
      if (error.code !== "auth/popup-closed-by-user" && error.code !== "auth/cancelled-popup-request") {
        showError("Google orqali kirishda xatolik!");
      }
    }
  };

  // ============================================
  // HELPER FUNCTIONS
  // ============================================
  function hideAlerts() {
    ["errorAlert", "successAlert", "warningAlert"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = "none";
    });
  }

  function showError(msg) {
    const el = document.getElementById("errorAlert");
    if (el) { el.textContent = msg; el.style.display = "block"; }
  }

  function showSuccess(msg) {
    const el = document.getElementById("successAlert");
    if (el) { el.textContent = msg; el.style.display = "block"; }
  }

  document.getElementById("password")?.addEventListener("keypress", (e) => {
    if (e.key === "Enter") handleSignup();
  });
</script>

    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="../JS/app.js"></script>
  </body>
</html>
